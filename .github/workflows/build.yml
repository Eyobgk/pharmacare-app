name: Build Debug APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Show environment info
        run: |
          echo "Java version:"
          java -version
          echo "Android SDK: $ANDROID_SDK_ROOT"
          echo "Gradle wrapper JAR exists: $(test -f gradle/wrapper/gradle-wrapper.jar && echo YES || echo NO)"
          echo "gradlew executable: $(test -x gradlew && echo YES || echo NO)"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Build Debug APK
        run: ./gradlew assembleDebug --info --stacktrace 2>&1

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PharmaCare-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            app/build/reports/
            ~/.gradle/daemon/*/daemon-*.out.log
          retention-days: 7
